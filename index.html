<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>선웅이의 카운터 게임</title>
    <style>
        body { background-color: #1a1a1a; color: white; text-align: center; font-family: sans-serif; padding-top: 50px; }
        .box { border: 2px solid #444; padding: 20px; margin: 15px auto; border-radius: 15px; width: 300px; background: #252525; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; border-radius: 5px; border: none; font-weight: bold; transition: 0.2s; }
        button:hover { opacity: 0.8; transform: scale(1.05); }
        .warrior { background: #ff4757; color: white; }
        .hunter { background: #2ed573; color: white; }
        .wizard { background: #1e90ff; color: white; }
        #log { background: #2f3542; padding: 15px; height: 180px; overflow-y: auto; width: 80%; margin: 20px auto; border-radius: 10px; text-align: left; border: 1px solid #555; line-height: 1.6; }
    </style>
</head>
<body>
    <h1>🎮 프로젝트: 카운터</h1>
    <p>버튼을 눌러 각 직업의 스킬을 테스트해보세요!</p>
    
    <div class="box">
        <h3>⚔️ 워리어</h3>
        <button class="warrior" onclick="play('워리어', '근접 공격')">공격</button>
        <button class="warrior" onclick="play('워리어', '돌진')">이동</button>
        <button class="warrior" onclick="play('워리어', '방어')">방어</button>
    </div>

    <div class="box">
        <h3>🏹 헌터</h3>
        <button class="hunter" onclick="play('헌터', '중거리 공격')">공격</button>
        <button class="hunter" onclick="play('헌터', '은신')">이동</button>
        <button class="hunter" onclick="play('헌터', '패링/가드')">방어</button>
    </div>

    <div class="box">
        <h3>🪄 마법사</h3>
        <button class="wizard" onclick="play('마법사', '원거리 공격')">공격</button>
        <button class="wizard" onclick="play('마법사', '순간이동')">이동</button>
        <button class="wizard" onclick="play('마법사', '방어막')">방어</button>
    </div>

    <div id="log">배틀 기록이 여기에 실시간으로 표시됩니다...<br></div>

    <script>
        function play(job, skill) {
            const log = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            log.innerHTML += `[${time}] <b>${job}</b>: ${skill} 사용!<br>`;
            log.scrollTop = log.scrollHeight;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>선웅이의 로그라이크: 에디션 2.0</title>
    <style>
        body { background-color: #1a1a1a; color: white; text-align: center; font-family: 'Apple SD Gothic Neo', sans-serif; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        .game-layout { display: flex; gap: 20px; justify-content: center; }
        .screen { display: none; background: #252525; padding: 25px; border-radius: 15px; border: 2px solid #444; flex: 2; }
        .sidebar { background: #252525; padding: 20px; border-radius: 15px; border: 2px solid #444; flex: 1; text-align: left; }
        .active { display: block; }

        /* UI 요소 */
        .hp-bar-outer { width: 100%; background: #333; height: 15px; border-radius: 10px; margin: 5px 0; border: 1px solid #555; }
        .hp-bar-inner { height: 100%; background: #2ed573; transition: width 0.3s; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; border-radius: 5px; border: none; font-weight: bold; }
        .item-tag { font-size: 0.8em; padding: 2px 5px; border-radius: 3px; margin-right: 5px; }
        .epic { background: #a55eea; color: white; }
        .rare { background: #1e90ff; color: white; }
        
        #log { background: #111; padding: 15px; height: 150px; overflow-y: auto; border-radius: 10px; text-align: left; font-size: 0.85em; border: 1px solid #333; }
        .shop-item { background: #333; padding: 10px; margin: 10px 0; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>💀 카운터 던전 2.0</h1>
        
        <div class="game-layout">
            <div class="screen active" id="main-screen">
                <div id="start-area">
                    <h2>직업 선택</h2>
                    <button onclick="startGame('Warrior')" style="background:#ff4757;">워리어</button>
                    <button onclick="startGame('Hunter')" style="background:#2ed573;">헌터</button>
                    <button onclick="startGame('Wizard')" style="background:#1e90ff;">마법사</button>
                </div>

                <div id="battle-area" style="display:none;">
                    <div style="display:flex; justify-content:space-between;">
                        <div style="width:45%">
                            <h4 id="p-name">나</h4>
                            <div class="hp-bar-outer"><div id="p-hp" class="hp-bar-inner"></div></div>
                            <span id="p-hp-t"></span>
                        </div>
                        <div style="width:45%">
                            <h4 id="e-name">적</h4>
                            <div class="hp-bar-outer"><div id="e-hp" class="hp-bar-inner" style="background:#eb4d4b;"></div></div>
                            <span id="e-hp-t"></span>
                        </div>
                    </div>
                    <div id="skill-btns" style="margin-top:20px;"></div>
                </div>

                <div id="shop-area" style="display:none;">
                    <h2>🛒 신비한 상점</h2>
                    <p>골드를 사용하여 전력을 보강하세요.</p>
                    <div id="shop-list"></div>
                    <button onclick="nextFloor()" style="background:#555;">마을 떠나기</button>
                </div>
            </div>

            <div class="sidebar">
                <h4>📊 현재 상태</h4>
                <p>층수: <b id="floor-t">1</b>F | 골드: <b id="gold-t">0</b>G</p>
                <p>공격력: <b id="atk-t">0</b> | 명중보정: +<b id="acc-t">0</b>%</p>
                <hr>
                <h4>🎒 착용 장비</h4>
                <div id="inv-list" style="font-size:0.9em;">장비 없음</div>
                <hr>
                <h4>🏆 최고 기록</h4>
                <div id="rank-list" style="font-size:0.8em; color:#aaa;">기록 없음</div>
            </div>
        </div>

        <div id="log">던전 입구를 찾는 중...</div>
    </div>

    <script>
        let floor = 1, gold = 0, player = null, enemy = null;
        const jobBase = {
            Warrior: { name: '워리어', hp: 200, atk: 20, skills: ['강타(85%)', '방어(100%)'] },
            Hunter: { name: '헌터', hp: 150, atk: 25, skills: ['조준사격(80%)', '연사(65%)'] },
            Wizard: { name: '마법사', hp: 100, atk: 45, skills: ['파이어볼(75%)', '매직볼(95%)'] }
        };

        const itemPool = [
            { name: "빨간 포션", type: "heal", value: 50, price: 30 },
            { name: "날카로운 검", type: "atk", value: 10, price: 50, rarity: "rare" },
            { name: "무거운 갑옷", type: "hp", value: 50, price: 60, rarity: "rare" },
            { name: "명중의 장갑", type: "acc", value: 10, price: 80, rarity: "epic" }
        ];

        function startGame(job) {
            player = { ...jobBase[job], curHp: jobBase[job].hp, maxHp: jobBase[job].hp, acc: 0, items: [] };
            document.getElementById('start-area').style.display = 'none';
            document.getElementById('battle-area').style.display = 'block';
            loadRank();
            spawnEnemy();
        }

        function spawnEnemy() {
            if (floor % 3 === 0) return openShop(); // 3층마다 상점
            enemy = { name: `지하 ${floor}층 괴수`, hp: 40 + floor*20, curHp: 40 + floor*20, atk: 8 + floor*4 };
            updateUi();
            renderSkills();
        }

        function renderSkills() {
            const div = document.getElementById('skill-btns');
            div.innerHTML = '';
            player.skills.forEach(s => {
                const b = document.createElement('button');
                b.innerText = s; b.onclick = () => useSkill(s);
                div.appendChild(b);
            });
        }

        function useSkill(sName) {
            const baseAcc = parseInt(sName.match(/\d+/)[0]);
            if (Math.random() * 100 < (baseAcc + player.acc)) {
                const dmg = player.atk + Math.floor(Math.random()*10);
                enemy.curHp -= dmg;
                writeLog(`[공격] ${sName} 적중! ${dmg} 데미지.`);
            } else writeLog(`[실패] 공격이 빗나갔습니다!`);

            if (enemy.curHp <= 0) {
                const gain = 20 + Math.floor(Math.random()*20);
                gold += gain;
                writeLog(`[승리] ${gain}골드 획득!`);
                floor++;
                return spawnEnemy();
            }

            player.curHp -= enemy.atk;
            if (player.curHp <= 0) gameOver();
            updateUi();
        }

        function openShop() {
            document.getElementById('battle-area').style.display = 'none';
            document.getElementById('shop-area').style.display = 'block';
            const list = document.getElementById('shop-list');
            list.innerHTML = '';
            itemPool.forEach((it, idx) => {
                const d = document.createElement('div');
                d.className = 'shop-item';
                d.innerHTML = `<span>${it.name} (${it.price}G)</span><button onclick="buyItem(${idx})">구매</button>`;
                list.appendChild(d);
            });
        }

        function buyItem(idx) {
            const it = itemPool[idx];
            if (gold < it.price) return writeLog("골드가 부족해!");
            
            gold -= it.price;
            if (it.type === 'heal') player.curHp = Math.min(player.maxHp, player.curHp + it.value);
            else {
                if (player.items.some(i => i.name === it.name)) {
                    writeLog("이미 착용 중인 장비야! 골드로 환급할게.");
                    gold += Math.floor(it.price / 2);
                } else {
                    player.items.push(it);
                    if (it.type === 'atk') player.atk += it.value;
                    if (it.type === 'hp') { player.maxHp += it.value; player.curHp += it.value; }
                    if (it.type === 'acc') player.acc += it.value;
                }
            }
            updateUi();
            openShop();
        }

        function nextFloor() {
            floor++;
            document.getElementById('shop-area').style.display = 'none';
            document.getElementById('battle-area').style.display = 'block';
            spawnEnemy();
        }

        function updateUi() {
            document.getElementById('p-hp').style.width = (player.curHp/player.maxHp*100)+'%';
            document.getElementById('p-hp-t').innerText = `${player.curHp}/${player.maxHp}`;
            if(enemy) {
                document.getElementById('e-hp').style.width = (enemy.curHp/enemy.hp*100)+'%';
                document.getElementById('e-hp-t').innerText = `${enemy.curHp}/${enemy.hp}`;
                document.getElementById('e-name').innerText = enemy.name;
            }
            document.getElementById('floor-t').innerText = floor;
            document.getElementById('gold-t').innerText = gold;
            document.getElementById('atk-t').innerText = player.atk;
            document.getElementById('acc-t').innerText = player.acc;
            document.getElementById('inv-list').innerHTML = player.items.map(i => `<div class="item-tag ${i.rarity}">${i.name}</div>`).join('') || '장비 없음';
        }

        function gameOver() {
            saveRank();
            alert(`게임 오버! ${floor}층까지 도달했습니다.`);
            location.reload();
        }

        function saveRank() {
            let ranks = JSON.parse(localStorage.getItem('counter_rank') || '[]');
            ranks.push({ job: player.name, floor: floor, date: new Date().toLocaleDateString() });
            ranks.sort((a, b) => b.floor - a.floor);
            localStorage.setItem('counter_rank', JSON.stringify(ranks.slice(0, 5)));
        }

        function loadRank() {
            let ranks = JSON.parse(localStorage.getItem('counter_rank') || '[]');
            document.getElementById('rank-list').innerHTML = ranks.map(r => `<div>${r.floor}층 (${r.job}) - ${r.date}</div>`).join('') || '기록 없음';
        }

        function writeLog(m) {
            const l = document.getElementById('log');
            l.innerHTML = `> ${m}<br>` + l.innerHTML;
        }

        loadRank();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>카운터 던전 v3.0: 클래스 특화</title>
    <style>
        body { background-color: #1a1a1a; color: white; text-align: center; font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .container { max-width: 950px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        .game-layout { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .screen { background: #252525; padding: 25px; border-radius: 15px; border: 2px solid #444; flex: 2; min-width: 350px; }
        .sidebar { background: #252525; padding: 20px; border-radius: 15px; border: 2px solid #444; flex: 1; text-align: left; min-width: 250px; }
        .hp-bar-outer { width: 100%; background: #333; height: 15px; border-radius: 10px; margin: 5px 0; border: 1px solid #555; }
        .hp-bar-inner { height: 100%; background: #2ed573; transition: width 0.3s; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; border-radius: 5px; border: none; font-weight: bold; transition: 0.2s; }
        button:hover { opacity: 0.8; transform: scale(1.05); }
        #log { background: #111; padding: 15px; height: 200px; overflow-y: auto; border-radius: 10px; text-align: left; font-size: 0.85em; border: 1px solid #333; margin-top: 10px; color: #ccc; }
        .item-tag { font-size: 0.8em; padding: 2px 5px; border-radius: 3px; margin-right: 5px; display: inline-block; margin-bottom: 5px; font-weight: bold; }
        .epic { background: #a55eea; color: white; }
        .rare { background: #1e90ff; color: white; }
        .penalty { background: #ff4757; color: white; font-size: 0.75em; padding: 1px 4px; border-radius: 3px; margin-left: 5px; }
        .patch-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.85em; background: #222; }
        .patch-table th, .patch-table td { border: 1px solid #333; padding: 10px; text-align: left; }
        .patch-table th { background: #333; color: #f1c40f; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚔️ 카운터 던전 (v3.0: 전용 장비)</h1>
        
        <div class="game-layout">
            <div class="screen">
                <div id="start-area">
                    <h2>직업 선택</h2>
                    <button onclick="startGame('Warrior')" style="background:#ff4757;">워리어</button>
                    <button onclick="startGame('Hunter')" style="background:#2ed573;">헌터</button>
                    <button onclick="startGame('Wizard')" style="background:#1e90ff;">마법사</button>
                </div>

                <div id="battle-area" style="display:none;">
                    <div style="display:flex; justify-content:space-around;">
                        <div style="width:45%">
                            <h4 id="p-name">나</h4>
                            <div class="hp-bar-outer"><div id="p-hp" class="hp-bar-inner"></div></div>
                            <span id="p-hp-t"></span>
                            <div id="p-status" style="color:#f1c40f; font-size:0.8em; height:1.2em;"></div>
                        </div>
                        <div style="width:45%">
                            <h4 id="e-name">적</h4>
                            <div class="hp-bar-outer"><div id="e-hp" class="hp-bar-inner" style="background:#eb4d4b;"></div></div>
                            <span id="e-hp-t"></span>
                        </div>
                    </div>
                    <div id="skill-btns" style="margin-top:20px;"></div>
                </div>

                <div id="shop-area" style="display:none;">
                    <h2>🛒 신비한 상점 (골드: <span id="shop-gold">0</span>G)</h2>
                    <div id="shop-list"></div>
                    <button onclick="nextFloor()" style="background:#555;">다음 층으로</button>
                </div>
            </div>

            <div class="sidebar">
                <h4>📊 캐릭터 스탯</h4>
                <p>층수: <b id="floor-t">1</b>F | 골드: <b id="gold-t">0</b>G</p>
                <p>공격력: <b id="atk-t">0</b> | 명중: <b id="acc-t">0</b>%</p>
                <hr>
                <h4>🎒 착용 장비</h4>
                <div id="inv-list">없음</div>
                <hr>
                <h4>🏆 최고 기록</h4>
                <div id="rank-list" style="font-size:0.8em; color:#aaa;"></div>
            </div>
        </div>

        <div id="log">던전에 입장할 준비가 되었습니다.</div>

        <div style="margin-top:40px; text-align:left; background:#222; padding:20px; border-radius:15px; border:1px solid #444;">
            <h2 style="color:#f1c40f;">📋 패치 노트 v3.0</h2>
            <table class="patch-table">
                <thead><tr><th>구분</th><th>내용</th><th>의도</th></tr></thead>
                <tbody>
                    <tr><td><b style="color:#a55eea;">신규</b></td><td>클래스 전용 장비 시스템</td><td>특정 직업 착용 시 보너스 스탯 및 전용 스킬 해제</td></tr>
                    <tr><td><b style="color:#ff4757;">패널티</b></td><td>장비 무게 시스템</td><td>마법사/헌터가 중갑 착용 시 명중률 <b>-25%/-15%</b> 패널티</td></tr>
                    <tr><td><b style="color:#1e90ff;">상점</b></td><td>품목 다양화</td><td>직업별 전용 무기 6종 추가 및 상점 리스트 확장</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let floor = 1, gold = 0, player = null, enemy = null, isDefending = false;

        const jobBase = {
            Warrior: { name: '워리어', hp: 220, atk: 20, skills: ['강타(90%)', '방패 방어(100%)'] },
            Hunter: { name: '헌터', hp: 160, atk: 25, skills: ['조준 사격(95%)', '연사(75%)'] },
            Wizard: { name: '마법사', hp: 110, atk: 50, skills: ['파이어볼(80%)', '매직볼(100%)'] }
        };

        const itemPool = [
            { name: "치유 포션", type: "heal", value: 100, price: 40 },
            { name: "거인족의 대검", type: "atk", value: 15, price: 80, rarity: "rare", preferred: "워리어", bonus: 10 },
            { name: "중갑옷", type: "hp", value: 80, price: 70, rarity: "rare", penalty: { '마법사': 25, '헌터': 15 } },
            { name: "마법사의 지팡이", type: "atk", value: 10, price: 90, rarity: "epic", preferred: "마법사", unlock: "메테오(60%)" },
            { name: "추적자의 활", type: "atk", value: 12, price: 85, rarity: "rare", preferred: "헌터", unlock: "독화살(85%)" },
            { name: "현자의 로브", type: "hp", value: 30, price: 60, rarity: "rare", preferred: "마법사", bonusAcc: 10 },
            { name: "기사의 방패", type: "hp", value: 40, price: 55, rarity: "rare", preferred: "워리어", bonusHp: 30 }
        ];

        function startGame(job) {
            player = { ...jobBase[job], curHp: jobBase[job].hp, maxHp: jobBase[job].hp, acc: 0, items: [], extraAtk: 0 };
            document.getElementById('start-area').style.display = 'none';
            document.getElementById('battle-area').style.display = 'block';
            loadRank();
            spawnEnemy();
        }

        function spawnEnemy() {
            if (floor % 3 === 0) return openShop();
            isDefending = false;
            enemy = { name: `${floor}층 괴수`, hp: 45 + floor*18, curHp: 45 + floor*18, atk: 12 + floor*3 };
            updateUi();
            renderSkills();
        }

        function renderSkills() {
            const div = document.getElementById('skill-btns');
            div.innerHTML = '';
            player.skills.forEach(s => {
                const b = document.createElement('button');
                b.innerText = s; b.onclick = () => useSkill(s);
                if(player.name === '워리어' && s.includes('방어')) b.style.background = '#ff4757';
                div.appendChild(b);
            });
        }

        function useSkill(sName) {
            if (sName === '방패 방어(100%)') {
                isDefending = true;
                writeLog(`[방어] 데미지 70% 감소 대기.`);
                enemyTurn();
                return;
            }
            const baseAcc = parseInt(sName.match(/\d+/)[0]);
            const finalAcc = baseAcc + player.acc;
            if (Math.random() * 100 < finalAcc) {
                let dmg = player.atk + player.extraAtk + Math.floor(Math.random()*15);
                if(sName.includes('메테오')) dmg += 40; // 전용스킬 보너스
                enemy.curHp -= dmg;
                writeLog(`[명중] ${sName}! ${dmg} 피해.`);
            } else writeLog(`[실패] 빗나감! (확률: ${finalAcc}%)`);
            if (enemy.curHp <= 0) return winBattle();
            enemyTurn();
        }

        function enemyTurn() {
            setTimeout(() => {
                let dmg = isDefending ? Math.floor(enemy.atk * 0.3) : enemy.atk;
                player.curHp -= dmg;
                writeLog(`[피격] 적 공격! ${dmg} 데미지.`);
                isDefending = false;
                if (player.curHp <= 0) gameOver();
                updateUi();
            }, 400);
        }

        function winBattle() {
            const gain = 30 + Math.floor(Math.random()*20);
            gold += gain;
            player.curHp = Math.min(player.maxHp, player.curHp + Math.floor(player.maxHp * 0.2));
            writeLog(`[승리] ${gain}G 획득 및 회복.`);
            floor++;
            spawnEnemy();
        }

        function openShop() {
            player.curHp = player.maxHp;
            document.getElementById('battle-area').style.display = 'none';
            document.getElementById('shop-area').style.display = 'block';
            document.getElementById('shop-gold').innerText = gold;
            const list = document.getElementById('shop-list');
            list.innerHTML = '';
            itemPool.forEach((it, idx) => {
                const d = document.createElement('div');
                d.style.marginBottom = '10px';
                d.innerHTML = `<b>${it.name}</b> (${it.price}G) <button onclick="buyItem(${idx})">구매</button>`;
                list.appendChild(d);
            });
        }

        function buyItem(idx) {
            const it = itemPool[idx];
            if (gold < it.price) return;
            gold -= it.price;
            document.getElementById('shop-gold').innerText = gold;

            if (it.type === 'heal') {
                player.curHp = Math.min(player.maxHp, player.curHp + it.value);
            } else {
                if (!player.items.some(i => i.name === it.name)) {
                    player.items.push(it);
                    // 기본 스탯 적용
                    if (it.type === 'atk') player.atk += it.value;
                    if (it.type === 'hp') { player.maxHp += it.value; player.curHp += it.value; }
                    if (it.type === 'acc') player.acc += it.value;
                    
                    // 전용 보너스 및 패널티 로직
                    if (it.preferred === player.name) {
                        if (it.bonus) player.extraAtk += it.bonus;
                        if (it.bonusAcc) player.acc += it.bonusAcc;
                        if (it.bonusHp) { player.maxHp += it.bonusHp; player.curHp += it.bonusHp; }
                        if (it.unlock && !player.skills.includes(it.unlock)) player.skills.push(it.unlock);
                        writeLog(`[전용 장비] ${player.name} 전용 효과 발동!`);
                    }
                    if (it.penalty && it.penalty[player.name]) {
                        player.acc -= it.penalty[player.name];
                        writeLog(`[패널티] 장비가 무거워 명중률이 ${it.penalty[player.name]}% 감소합니다.`);
                    }
                } else {
                    player.maxHp += 15; player.curHp += 15;
                    writeLog("중복 장비 보너스! 최대 HP +15");
                }
            }
            updateUi();
        }

        function nextFloor() {
            floor++;
            document.getElementById('shop-area').style.display = 'none';
            document.getElementById('battle-area').style.display = 'block';
            spawnEnemy();
        }

        function updateUi() {
            document.getElementById('p-hp').style.width = (player.curHp/player.maxHp*100)+'%';
            document.getElementById('p-hp-t').innerText = `${player.curHp}/${player.maxHp}`;
            document.getElementById('p-status').innerText = isDefending ? "🛡️ 방어 태세" : "";
            if(enemy && enemy.curHp > 0) {
                document.getElementById('e-hp').style.width = (enemy.curHp/enemy.hp*100)+'%';
                document.getElementById('e-hp-t').innerText = `${enemy.curHp}/${enemy.hp}`;
                document.getElementById('e-name').innerText = enemy.name;
            }
            document.getElementById('floor-t').innerText = floor;
            document.getElementById('gold-t').innerText = gold;
            document.getElementById('atk-t').innerText = player.atk + (player.extraAtk || 0);
            document.getElementById('acc-t').innerText = 100 + player.acc;
            document.getElementById('inv-list').innerHTML = player.items.map(i => {
                let p = (i.penalty && i.penalty[player.name]) ? `<span class="penalty">-${i.penalty[player.name]}%</span>` : "";
                return `<div class="item-tag ${i.rarity}">${i.name}${p}</div>`;
            }).join('') || '없음';
        }

        function gameOver() {
            saveRank();
            alert(`전사했습니다. 도달: ${floor}F`);
            location.reload();
        }

        function saveRank() {
            let ranks = JSON.parse(localStorage.getItem('counter_rank_v3') || '[]');
            ranks.push({ job: player.name, floor: floor, date: new Date().toLocaleDateString() });
            ranks.sort((a, b) => b.floor - a.floor);
            localStorage.setItem('counter_rank_v3', JSON.stringify(ranks.slice(0, 5)));
        }

        function loadRank() {
            let ranks = JSON.parse(localStorage.getItem('counter_rank_v3') || '[]');
            document.getElementById('rank-list').innerHTML = ranks.map(r => `<div>${r.floor}층(${r.job})</div>`).join('') || '기록 없음';
        }

        function writeLog(m) {
            const l = document.getElementById('log');
            l.innerHTML = `> ${m}<br>` + l.innerHTML;
        }

        loadRank();
    </script>
</body>
</html>

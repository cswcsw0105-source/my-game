<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>카운터 던전 v3.3: 메커니즘 롤백 및 특수기 에디션</title>
    <style>
        /* 배경을 밝게, 글씨를 검게(어두운 회색) 변경 */
        body { background-color: #f4f6f8; color: #1a1a1a; text-align: center; font-family: 'Apple SD Gothic Neo', sans-serif; padding: 20px; line-height: 1.6; }
        .container { max-width: 950px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        .game-layout { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; } 
        /* 스크린과 사이드바를 하얀색으로 깔끔하게 처리 */
        .screen { background: #ffffff; padding: 25px; border-radius: 15px; border: 2px solid #e1e4e8; flex: 2; min-width: 350px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .sidebar { background: #ffffff; padding: 20px; border-radius: 15px; border: 2px solid #e1e4e8; flex: 1; text-align: left; min-width: 250px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .hp-bar-outer { width: 100%; background: #e1e4e8; height: 15px; border-radius: 10px; margin: 5px 0; border: 1px solid #ccc; }
        .hp-bar-inner { height: 100%; background: #2ed573; transition: width 0.3s; }
        button { padding: 12px 18px; margin: 5px; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; transition: 0.2s; font-size: 1em; color: white; }
        button:hover { opacity: 0.8; transform: scale(1.05); }
        .potion-btn { background: #f1c40f !important; color: black !important; }
        /* 로그창도 밝고 부드럽게 변경 */
        #log { background: #f8f9fa; padding: 15px; height: 180px; overflow-y: auto; border-radius: 10px; text-align: left; font-size: 0.85em; border: 1px solid #e1e4e8; margin-top: 10px; color: #333; }
        .stat-tag { font-size: 0.8em; color: #666; } 
        /* 패치 노트 디자인 변경 */
        #patch-notes { margin-top: 40px; text-align: left; background: #ffffff; padding: 25px; border-radius: 15px; border: 1px solid #e1e4e8; font-size: 0.85em; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        #patch-notes h2 { border-bottom: 2px solid #e1e4e8; padding-bottom: 10px; color: #1a1a1a; }
        .patch-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .patch-table th, .patch-table td { border: 1px solid #e1e4e8; padding: 12px; text-align: left; }
        .patch-table th { background: #f4f6f8; color: #1a1a1a; font-weight: bold; }
        .v-tag { font-weight: bold; color: #d35400; }
        .up { color: #2ed573; font-weight: bold; }
        .down { color: #ff4757; font-weight: bold; }
        .pivot { color: #d35400; font-weight: bold; border: 1px solid #d35400; padding: 1px 4px; border-radius: 3px; font-size: 0.8em; }
</head>
<body>
    <div class="container">
        <h1>⚔️ 카운터 던전 (v3.3: 특수기 복구)</h1>
        <div class="game-layout">
            <div class="screen">
                <div id="start-area">
                    <h2>직업 선택</h2>
                    <button onclick="startGame('Warrior')" style="background:#ff4757;">워리어</button>
                    <button onclick="startGame('Hunter')" style="background:#2ed573;">헌터</button>
                    <button onclick="startGame('Wizard')" style="background:#1e90ff;">마법사</button>
                </div>
                <div id="battle-area" style="display:none;">
                    <div style="display:flex; justify-content:space-around;">
                        <div style="width:45%">
                            <h4 id="p-name">나</h4>
                            <div class="hp-bar-outer"><div id="p-hp" class="hp-bar-inner"></div></div>
                            <span id="p-hp-t"></span>
                            <div class="stat-tag">ATK: <span id="p-atk-val">0</span> / DEF: <span id="p-def-val">0</span></div>
                        </div>
                        <div style="width:45%">
                            <h4 id="e-name">적</h4>
                            <div class="hp-bar-outer"><div id="e-hp" class="hp-bar-inner" style="background:#eb4d4b;"></div></div>
                            <span id="e-hp-t"></span>
                            <div class="stat-tag">ATK: <span id="e-atk-val">0</span> / DEF: <span id="e-def-val">0</span></div>
                        </div>
                    </div>
                    <div id="action-btns" style="margin-top:25px;"></div>
                </div>
                <div id="shop-area" style="display:none;">
                    <h2>🛒 신비한 상점</h2>
                    <p>현재 체력: <b id="shop-hp-t" style="color:#2ed573;">0/0</b> | 골드: <b id="shop-gold-t">0</b>G</p>
                    <div id="shop-list"></div>
                    <button onclick="nextFloor()" style="background:#555;">다시 모험을 떠난다</button>
                </div>
            </div>
            <div class="sidebar">
                <h4>📊 캐릭터 상태</h4>
                <p>층수: <b id="floor-t">1</b>F | 골드: <b id="gold-t">0</b>G</p>
                <p>소지 포션: <b id="potion-t">0</b>개</p>
                <hr>
                <h4>🎒 장비/패널티</h4>
                <div id="inv-list" style="font-size:0.85em;">없음</div>
                <hr>
                <h4>🏆 전당</h4>
                <div id="rank-list" style="font-size:0.8em; color:#aaa;"></div>
            </div>
        </div>
        <div id="log">최종 점검을 시작합니다...</div>

        <div id="patch-notes">
            <h2>📜 패치 히스토리 (v1.0 ~ v3.3)</h2>
            <table class="patch-table">
                <thead>
                    <tr>
                        <th>버전</th>
                        <th>구분</th>
                        <th>상세 내용 및 기획 의도</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="v-tag">v3.3</td>
                        <td><b style="color:#1e90ff;">롤백/추가</b></td>
                        <td><b>상성 로직 복구:</b> 적에게 클래스 부여. 1.5배/0.8배 상성 데미지 부활.<br><b>직업별 특수기:</b> 헌터(회피 기동), 마법사(방어막) 등 고유 생존기 버튼 추가.</td>
                    </tr>
                    <tr>
                        <td class="v-tag">v3.2</td>
                        <td><span class="up">시스템</span></td>
                        <td><b>방어력(DEF) 도입:</b> 데미지 계산식 수정 (ATK - 상대 DEF). 스탯창에 방어력 표기 추가.<br><b>인전투 포션:</b> 상점 포션을 전투 중에 전략적으로 사용 가능.</td>
                    </tr>
                    <tr>
                        <td class="v-tag">v3.1</td>
                        <td><span class="down">핫픽스</span></td>
                        <td><b>경제 버그 수정:</b> 골드 부족 시 구매 불가 및 차감 로직 정상화.<br><b>워리어 리워크:</b> 방패 방어 성공 시 <b>2턴간 피해 70% 감소</b> (성공률 80%).</td>
                    </tr>
                    <tr>
                        <td class="v-tag">v3.0</td>
                        <td><span class="pivot">PIVOT</span></td>
                        <td><b>방향성 전환:</b> 데이터 비교에서 <b>로그라이크 RPG</b>로 게임성 강화.<br><b>전용 장비:</b> 특정 직업 착용 시 전용 스킬 해제 및 무게 패널티 도입.</td>
                    </tr>
                    <tr>
                        <td class="v-tag">v2.5</td>
                        <td><span class="up">밸런스</span></td>
                        <td><b>유지력 강화:</b> 전투 승리 시 HP 20% 즉시 회복.<br><b>명중률 상향:</b> 헌터 조준 사격 명중률 95%로 보정.</td>
                    </tr>
                    <tr>
                        <td class="v-tag">v2.0</td>
                        <td><span class="up">신규</span></td>
                        <td>층수 시스템, 3층마다 등장하는 상점, localStorage 기반 랭킹 저장 추가.</td>
                    </tr>
                    <tr>
                        <td class="v-tag">v1.5</td>
                        <td><span class="up">로직</span></td>
                        <td>워리어/헌터/마법사 가위바위보 상성 가중치 적용.</td>
                    </tr>
                    <tr>
                        <td class="v-tag">v1.0</td>
                        <td><span class="up">시작</span></td>
                        <td>프로젝트 카운터 초기 기획 및 웹 기반 기본 인터페이스 구현.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let floor = 1, gold = 0, player = null, enemy = null;
        let defendingTurns = 0;
        let isDodging = false;
        let isShielded = false;

        const relations = {
            '워리어': { weak: '마법사', strong: '헌터' },
            '헌터': { weak: '워리어', strong: '마법사' },
            '마법사': { weak: '헌터', strong: '워리어' }
        };

        const jobBase = {
            Warrior: { name: '워리어', hp: 220, atk: 20, def: 8, color: '#ff4757' },
            Hunter: { name: '헌터', hp: 160, atk: 25, def: 5, color: '#2ed573' },
            Wizard: { name: '마법사', hp: 110, atk: 50, def: 2, color: '#1e90ff' }
        };
        const itemPool = [
            { name: "치유 포션", type: "potion", value: 80, price: 40 },
            { name: "거인족의 대검", type: "atk", value: 15, price: 80, rarity: "rare", preferred: "워리어", bonus: 10 },
            { name: "중갑옷", type: "hp", value: 80, def: 10, price: 70, rarity: "rare", penalty: { '마법사': 25, '헌터': 15 } },
            { name: "마법사의 지팡이", type: "atk", value: 10, price: 90, rarity: "epic", preferred: "마법사", bonusAtk: 20 }
        ];

        function startGame(job) {
            player = { ...jobBase[job], curHp: jobBase[job].hp, maxHp: jobBase[job].hp, acc: 0, items: [], extraAtk: 0, potions: 0, extraDef: 0 };
            document.getElementById('start-area').style.display = 'none';
            document.getElementById('battle-area').style.display = 'block';
            loadRank();
            spawnEnemy();
        }

        function spawnEnemy() {
            if (floor % 3 === 0) return openShop();
            defendingTurns = 0;
            isDodging = false;
            isShielded = false;
            
            // 적 상성 직업 랜덤 배정
            const eJobs = ['워리어', '헌터', '마법사'];
            const randomJob = eJobs[Math.floor(Math.random() * eJobs.length)];

            enemy = { 
                name: `[${randomJob}형] ${floor}층 괴수`, 
                job: randomJob,
                hp: 50 + floor*15, curHp: 50 + floor*15, 
                atk: 12 + floor*3, def: 2 + Math.floor(floor/2) 
            };
            updateUi();
            renderActions();
        }

        function renderActions() {
            const div = document.getElementById('action-btns');
            div.innerHTML = '';

            // 공격 버튼
            const atkBtn = document.createElement('button');
            atkBtn.innerText = '⚔️ 공격';
            atkBtn.style.background = player.color;
            atkBtn.onclick = () => useAction('공격');
            div.appendChild(atkBtn);

            // 특수기 버튼
            const defBtn = document.createElement('button');
            defBtn.style.background = '#555';
            if (player.name === '워리어') {
                defBtn.innerText = '🛡️ 방패 방어 (80%)';
                defBtn.onclick = () => useAction('방패방어');
            } else if (player.name === '헌터') {
                defBtn.innerText = '💨 회피 기동 (60%)';
                defBtn.onclick = () => useAction('회피');
            } else if (player.name === '마법사') {
                defBtn.innerText = '✨ 마나 방어막 (70%)';
                defBtn.onclick = () => useAction('방어막');
            }
            div.appendChild(defBtn);

            // 포션 버튼
            const pBtn = document.createElement('button');
            pBtn.innerText = `🧪 포션 (${player.potions})`;
            pBtn.className = 'potion-btn';
            pBtn.onclick = usePotion;
            div.appendChild(pBtn);
        }

        function useAction(type) {
            isDodging = false;
            isShielded = false;

            if (type === '공격') {
                let multiplier = 1.0;
                let effectMsg = "";
                if (relations[player.name].strong === enemy.job) {
                    multiplier = 1.5;
                    effectMsg = "<b style='color:#2ed573'>(상성 우위!)</b> ";
                } else if (relations[player.name].weak === enemy.job) {
                    multiplier = 0.8;
                    effectMsg = "<b style='color:#ff4757'>(상성 열세..)</b> ";
                }

                if (Math.random() * 100 < (90 + player.acc)) {
                    let baseDmg = player.atk + player.extraAtk + Math.floor(Math.random()*10);
                    let finalDmg = Math.max(1, Math.floor(baseDmg * multiplier) - enemy.def);
                    enemy.curHp -= finalDmg;
                    writeLog(`[명중] ${effectMsg}적에게 ${finalDmg} 피해! (적 방어 ${enemy.def} 적용)`);
                } else {
                    writeLog(`[빗나감] 공격 실패!`);
                }
                if (enemy.curHp <= 0) return winBattle();

            } else if (type === '방패방어') {
                if (Math.random() * 100 < 80) {
                    defendingTurns = 2;
                    writeLog(`[성공] 2턴간 피해 70% 감소 방진 전개!`);
                } else writeLog(`[실패] 방패 방어 실패!`);
            } else if (type === '회피') {
                isDodging = true;
                writeLog(`[회피기] 다음 적의 공격을 60% 확률로 완벽히 회피합니다.`);
            } else if (type === '방어막') {
                if (Math.random() * 100 < 70) {
                    isShielded = true;
                    writeLog(`[성공] 마나 방어막 전개! 적의 다음 공격을 1회 무효화합니다.`);
                } else writeLog(`[실패] 방어막 전개에 실패했습니다!`);
            }
            
            enemyTurn();
        }

        function usePotion() {
            if (player.potions <= 0) return writeLog("소지한 포션이 없습니다!");
            player.potions--;
            const heal = 80;
            player.curHp = Math.min(player.maxHp, player.curHp + heal);
            writeLog(`[아이템] 포션 사용! 체력 ${heal} 회복.`);
            updateUi();
            renderActions();
            enemyTurn();
        }

        function enemyTurn() {
            setTimeout(() => {
                if (isDodging && Math.random() * 100 < 60) {
                    writeLog(`[회피 성공] 💨 적의 공격을 완벽하게 피했습니다!`);
                } else if (isShielded) {
                    writeLog(`[방어막] ✨ 마나 방어막이 적의 데미지를 흡수했습니다!`);
                    isShielded = false;
                } else {
                    let dmg = Math.max(1, enemy.atk - (player.def + player.extraDef));
                    if(defendingTurns > 0) {
                        dmg = Math.floor(dmg * 0.3);
                        defendingTurns--;
                        writeLog(`[철벽 방어] 🛡️ 데미지 대폭 경감! (${dmg} 입음)`);
                    } else {
                        writeLog(`[피격] 적의 공격! ${dmg} 데미지 입음. (내 방어력 ${player.def + player.extraDef} 적용)`);
                    }
                    player.curHp -= dmg;
                }
                
                if (player.curHp <= 0) gameOver();
                updateUi();
            }, 400);
        }

        function winBattle() {
            const gain = 30 + Math.floor(Math.random()*20);
            gold += gain;
            player.curHp = Math.min(player.maxHp, player.curHp + Math.floor(player.maxHp * 0.15));
            writeLog(`[승리] ${gain}G 획득 및 소량 회복.`);
            floor++;
            spawnEnemy();
        }

        function openShop() {
            document.getElementById('battle-area').style.display = 'none';
            document.getElementById('shop-area').style.display = 'block';
            updateUi();
            const list = document.getElementById('shop-list');
            list.innerHTML = '';
            itemPool.forEach((it, idx) => {
                const d = document.createElement('div');
                d.style.marginBottom = '10px';
                d.innerHTML = `<b>${it.name}</b> (${it.price}G) <button onclick="buyItem(${idx})">구매</button>`;
                list.appendChild(d);
            });
        }

        function buyItem(idx) {
            const it = itemPool[idx];
            if (gold < it.price) return writeLog("골드 부족!");
            gold -= it.price;
            if (it.type === 'potion') {
                player.potions++;
                writeLog(`[상점] 포션 구매 완료.`);
            } else {
                if (!player.items.some(i => i.name === it.name)) {
                    player.items.push(it);
                    if (it.type === 'atk') player.atk += it.value;
                    if (it.type === 'hp') { player.maxHp += it.value; player.curHp += it.value; }
                    if (it.def) player.extraDef += it.def;
                    if (it.preferred === player.name && it.bonusAtk) player.extraAtk += it.bonusAtk;
                    if (it.penalty && it.penalty[player.name]) player.acc -= it.penalty[player.name];
                } else {
                    player.maxHp += 15; player.curHp += 15;
                    writeLog("중복 보너스: HP +15");
                }
            }
            updateUi();
            document.getElementById('shop-hp-t').innerText = `${player.curHp}/${player.maxHp}`;
        }

        function nextFloor() {
            floor++;
            document.getElementById('shop-area').style.display = 'none';
            document.getElementById('battle-area').style.display = 'block';
            spawnEnemy();
        }

        function updateUi() {
            document.getElementById('p-hp').style.width = (player.curHp/player.maxHp*100)+'%';
            document.getElementById('p-hp-t').innerText = `${player.curHp}/${player.maxHp}`;
            document.getElementById('p-atk-val').innerText = player.atk + (player.extraAtk || 0);
            document.getElementById('p-def-val').innerText = player.def + (player.extraDef || 0);
            if(enemy && enemy.curHp > 0) {
                document.getElementById('e-hp').style.width = (enemy.curHp/enemy.hp*100)+'%';
                document.getElementById('e-hp-t').innerText = `${enemy.curHp}/${enemy.hp}`;
                document.getElementById('e-name').innerText = enemy.name;
                document.getElementById('e-atk-val').innerText = enemy.atk;
                document.getElementById('e-def-val').innerText = enemy.def;
            }
            document.getElementById('floor-t').innerText = floor;
            document.getElementById('gold-t').innerText = gold;
            document.getElementById('shop-gold-t').innerText = gold;
            document.getElementById('shop-hp-t').innerText = `${player.curHp}/${player.maxHp}`;
            document.getElementById('potion-t').innerText = player.potions;
            document.getElementById('inv-list').innerHTML = player.items.map(i => `<div class="stat-tag">${i.name}</div>`).join('') || '없음';
        }

        function gameOver() {
            saveRank();
            alert(`게임 오버! ${floor}층 도달`);
            location.reload();
        }

        function saveRank() {
            let ranks = JSON.parse(localStorage.getItem('final_rank') || '[]');
            ranks.push({ job: player.name, floor: floor, date: new Date().toLocaleDateString() });
            ranks.sort((a, b) => b.floor - a.floor);
            localStorage.setItem('final_rank', JSON.stringify(ranks.slice(0, 5)));
        }

        function loadRank() {
            let ranks = JSON.parse(localStorage.getItem('final_rank') || '[]');
            document.getElementById('rank-list').innerHTML = ranks.map(r => `<div>${r.floor}층(${r.job})</div>`).join('') || '없음';
        }

        function writeLog(m) {
            const l = document.getElementById('log');
            l.innerHTML = `> ${m}<br>` + l.innerHTML;
        }
        loadRank();
    </script>
</body>
</html>

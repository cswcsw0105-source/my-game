<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>선웅이의 로그라이크: 카운터 던전</title>
    <style>
        body { background-color: #1a1a1a; color: white; text-align: center; font-family: 'Apple SD Gothic Neo', sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .screen { display: none; background: #252525; padding: 30px; border-radius: 20px; border: 2px solid #444; }
        .active { display: block; }

        /* 체력바 및 상태창 */
        .status-area { display: flex; justify-content: space-around; margin-bottom: 20px; }
        .hp-bar-outer { width: 100%; background: #333; height: 20px; border-radius: 10px; overflow: hidden; border: 1px solid #555; }
        .hp-bar-inner { height: 100%; background: #2ed573; transition: width 0.3s; }
        
        /* 버튼 및 아이템 등급 색상 */
        button { padding: 12px 20px; margin: 8px; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; }
        .common { border: 2px solid #888; color: #888; }
        .rare { border: 2px solid #1e90ff; color: #1e90ff; }
        .epic { border: 2px solid #a55eea; color: #a55eea; }
        
        .skill-btn { background: #444; color: white; border: 1px solid #666; }
        .skill-btn:hover { background: #555; }
        
        #log { background: #111; padding: 15px; height: 180px; overflow-y: auto; border-radius: 10px; text-align: left; font-size: 0.9em; line-height: 1.5; margin-top: 20px; border: 1px solid #333; }
        .item-card { background: #333; padding: 15px; border-radius: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>💀 카운터 던전 (Roguelike)</h1>
        <p id="floor-indicator">현재 층: 1층</p>

        <div id="start-screen" class="screen active">
            <h2>직업을 선택하여 던전에 진입하세요</h2>
            <button onclick="startGame('Warrior')" style="background:#ff4757; color:white;">워리어 (높은 HP)</button>
            <button onclick="startGame('Hunter')" style="background:#2ed573; color:white;">헌터 (균형 잡힌 스탯)</button>
            <button onclick="startGame('Wizard')" style="background:#1e90ff; color:white;">마법사 (강력한 일격)</button>
        </div>

        <div id="battle-screen" class="screen">
            <div class="status-area">
                <div style="width: 45%;">
                    <h3 id="player-name">플레이어</h3>
                    <div class="hp-bar-outer"><div id="player-hp-bar" class="hp-bar-inner"></div></div>
                    <p id="player-hp-text">100 / 100</p>
                </div>
                <div style="width: 45%;">
                    <h3 id="enemy-name">몬스터</h3>
                    <div class="hp-bar-outer"><div id="enemy-hp-bar" class="hp-bar-inner" style="background:#eb4d4b;"></div></div>
                    <p id="enemy-hp-text">100 / 100</p>
                </div>
            </div>
            <div id="skill-container"></div>
        </div>

        <div id="loot-screen" class="screen">
            <h2>🎉 전투 승리!</h2>
            <p>새로운 아이템이나 스킬을 발견했습니다.</p>
            <div id="loot-item" class="item-card"></div>
            <button onclick="nextFloor()" style="background:#f1c40f; color:black;">다음 층으로 전진</button>
        </div>

        <div id="game-over-screen" class="screen">
            <h2 style="color:#eb4d4b;">당신은 죽었습니다.</h2>
            <p id="final-score"></p>
            <button onclick="location.reload()" style="background:#fff; color:#000;">다시 시작하기 (데이터 초기화)</button>
        </div>

        <div id="log">던전에 입장할 준비를 하세요...</div>
    </div>

    <script>
        // --- 게임 데이터 및 설정 ---
        let floor = 1;
        let player = null;
        let enemy = null;
        
        const jobBase = {
            Warrior: { name: '워리어', hp: 200, atk: 25, skills: ['베기(90%)', '방패 가격(70%)'] },
            Hunter: { name: '헌터', hp: 150, atk: 20, skills: ['화살 쏘기(85%)', '정밀 사격(60%)'] },
            Wizard: { name: '마법사', hp: 100, atk: 40, skills: ['매직 미사일(95%)', '화염 폭발(50%)'] }
        };

        const itemPool = [
            { name: "녹슨 검", atk: 5, rarity: "common" },
            { name: "강철 갑옷", hp: 30, rarity: "common" },
            { name: "빛나는 활", atk: 15, rarity: "rare" },
            { name: "마법사의 반지", atk: 20, rarity: "rare" },
            { name: "드래곤 슬레이어", atk: 50, rarity: "epic" },
            { name: "성기사의 방패", hp: 100, rarity: "epic" }
        ];

        // --- 게임 엔진 로직 ---

        function startGame(jobKey) {
            player = { 
                ...jobBase[jobKey], 
                currentHp: jobBase[jobKey].hp,
                maxHp: jobBase[jobKey].hp,
                items: []
            };
            showScreen('battle-screen');
            spawnEnemy();
            writeLog(`[입장] ${player.name}가 던전에 입장했습니다.`);
        }

        function spawnEnemy() {
            enemy = {
                name: `지하 ${floor}층 괴물`,
                hp: 50 + (floor * 20),
                currentHp: 50 + (floor * 20),
                atk: 10 + (floor * 5)
            };
            updateUi();
            renderSkills();
        }

        function renderSkills() {
            const container = document.getElementById('skill-container');
            container.innerHTML = '';
            player.skills.forEach(skill => {
                const btn = document.createElement('button');
                btn.className = 'skill-btn';
                btn.innerText = skill;
                btn.onclick = () => useSkill(skill);
                container.appendChild(btn);
            });
        }

        function useSkill(skillName) {
            // 1. 플레이어 공격
            const accuracy = parseInt(skillName.match(/\d+/)[0]);
            const isHit = Math.random() * 100 < accuracy;

            if (isHit) {
                const damage = player.atk + (Math.floor(Math.random() * 10));
                enemy.currentHp -= damage;
                writeLog(`[플레이어] ${skillName} 적중! ${damage}의 피해.`);
            } else {
                writeLog(`[플레이어] ${skillName} 실패... 공격이 빗나갔습니다.`);
            }

            if (enemy.currentHp <= 0) return win();

            // 2. 적 공격 (플레이어 턴 직후)
            setTimeout(() => {
                const enemyDamage = enemy.atk;
                player.currentHp -= enemyDamage;
                writeLog(`[적] ${enemy.name}의 반격! ${enemyDamage}의 피해.`);
                updateUi();
                if (player.currentHp <= 0) lose();
            }, 500);

            updateUi();
        }

        function win() {
            writeLog(`[승리] ${enemy.name}를 처치했습니다!`);
            showScreen('loot-screen');
            generateLoot();
        }

        function generateLoot() {
            const randomItem = itemPool[Math.floor(Math.random() * itemPool.length)];
            const lootDiv = document.getElementById('loot-item');
            lootDiv.innerHTML = `
                <h3 class="${randomItem.rarity}">${randomItem.name} (${randomItem.rarity.toUpperCase()})</h3>
                <p>${randomItem.atk ? '공격력 +' + randomItem.atk : ''} ${randomItem.hp ? '체력 +' + randomItem.hp : ''}</p>
            `;
            
            // 아이템 적용
            if (randomItem.atk) player.atk += randomItem.atk;
            if (randomItem.hp) {
                player.maxHp += randomItem.hp;
                player.currentHp += randomItem.hp;
            }
        }

        function nextFloor() {
            floor++;
            document.getElementById('floor-indicator').innerText = `현재 층: ${floor}층`;
            showScreen('battle-screen');
            spawnEnemy();
        }

        function lose() {
            document.getElementById('final-score').innerText = `당신은 ${floor}층에서 전사했습니다.`;
            showScreen('game-over-screen');
        }

        // --- 유틸리티 함수 ---

        function updateUi() {
            document.getElementById('player-hp-text').innerText = `${player.currentHp} / ${player.maxHp}`;
            document.getElementById('player-hp-bar').style.width = (player.currentHp / player.maxHp * 100) + '%';
            
            document.getElementById('enemy-hp-text').innerText = `${enemy.currentHp} / ${enemy.hp}`;
            document.getElementById('enemy-hp-bar').style.width = (enemy.currentHp / enemy.hp * 100) + '%';
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function writeLog(msg) {
            const log = document.getElementById('log');
            log.innerHTML = `> ${msg}<br>` + log.innerHTML;
        }
    </script>
</body>
</html>
